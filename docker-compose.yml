services:
  speedtest-exporter:
    image: techblog/speedtest-exporter:latest
    container_name: speedtest-exporter
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./data:/data
    environment:
      SPEEDTEST_DATA_DIR: /data
      SPEEDTEST_SCHEDULE: "@every 1h"
      SPEEDTEST_SERVER_PORT: "9090"
      # SPEEDTEST_ENGINE: go         # or: ookla
      # SPEEDTEST_THRESHOLDS_MIN_DOWNLOAD_MBPS: "50"
      # SPEEDTEST_WEBHOOKS: "https://hooks.example.com/speedtest"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  prometheus-data:
  grafana-data:
